name: liftlog_coach
description: A powerlifting coach-client video feedback app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Appwrite — v20+ resolves the flutter_web_auth_2 conflict
  appwrite: ^20.3.1

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Modern UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.1

  # Video
  image_picker: ^1.1.2
  video_player: ^2.8.6
  video_compress: ^3.1.0

  # UI utilities
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

flutter:
  uses-material-design: true