name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Set minimum iOS deployment target
        run: |
          # Ensure Podfile exists
          cd ios
          if [ ! -f Podfile ]; then
            flutter precache --ios
            cd ..
            flutter pub get
            cd ios
          fi

          # Set minimum deployment target to 13.0 to fix Xcode 16 compatibility
          sed -i '' "s/platform :ios, '.*'/platform :ios, '13.0'/" Podfile

          # Add post_install hook to set deployment target on all pods
          if ! grep -q "IPHONEOS_DEPLOYMENT_TARGET" Podfile; then
            cat >> Podfile << 'EOF'

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
              end
            end
          end
          EOF
          fi

          pod install --repo-update

      - name: Build IPA (Unsigned)
        run: flutter build ipa --no-codesign

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gym-app-ipa
          path: build/ios/ipa/*.ipa
