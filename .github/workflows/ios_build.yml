name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Fix iOS deployment target
        working-directory: ios
        run: |
          # Replace the platform line
          sed -i '' "s/platform :ios, '.*'/platform :ios, '13.0'/" Podfile

          # Replace the post_install block entirely with our fixed version
          ruby -e '
            content = File.read("Podfile")
            # Remove existing post_install block
            content.gsub!(/post_install do \|installer\|.*?^end/m, "")
            # Add our custom post_install block
            content += <<~RUBY

            post_install do |installer|
              installer.pods_project.targets.each do |target|
                flutter_additional_ios_build_settings(target)
                target.build_configurations.each do |config|
                  config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.0"
                end
              end
            end
            RUBY
            File.write("Podfile", content)
          '

          echo "=== Final Podfile ==="
          cat Podfile
          echo "====================="

          pod install --repo-update

      - name: Build IPA (Unsigned)
        run: flutter build ipa --no-codesign

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gym-app-ipa
          path: build/ios/ipa/*.ipa
